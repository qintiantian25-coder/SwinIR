[dataset]
data_root = /home/student_server/Qtt/NAFNet/data_new
split = train
gray_mode = single

[train]
# Training hyperparameters
patch_size = 128
batch_size = 4
epochs = 400
lr = 0.0002
alpha = 5.0
num_workers = 8
save_dir = experiments/fma_full
device = cuda
in_chans = 1
use_mask = False

# Resume from checkpoint (leave empty to start from scratch)
resume_from = 

# Mixed precision (True/False)
mixed_precision = True

# Use gradient checkpointing inside SwinIR blocks to reduce activation memory
use_checkpoint = True

# Gradient accumulation steps (useful if batch_size must be small)
accumulate_grad_batches = 1

[validation]
val_split = val
val_every = 10
patch_size = 128
batch_size = 4
image_border = 0

[test]
data_root = /home/student_server/Qtt/NAFNet/data_new
# path to evaluate checkpoint; can be updated after training
checkpoint = experiments/fma_full/best_model.pth
save_dir = results/fma_full_test
device = cuda
in_chans = 1
# point to the root mask folder; the test script will look for
#   <root>/<test_group>/blind_pixel_coords.csv
test_mask_csv = /home/student_server/Qtt/NAFNet/data_new/test_mask
image_border = 0
